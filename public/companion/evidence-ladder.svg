<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200" fill="none">
  <title>Evidence ladder</title>
  <rect width="640" height="200" fill="#13161f"/>
  <path d="M40 160 L320 40 L600 160" stroke="#c4a962" stroke-width="2"/>
  <rect x="48" y="130" width="100" height="36" rx="4" stroke="#5b7fa5" stroke-width="1.5" fill="#1a1e2b"/>
  <text x="98" y="152" fill="#9a968e" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Documentary</text>
  <rect x="188" y="100" width="100" height="36" rx="4" stroke="#c4a962" stroke-width="1.5" fill="#1a1e2b"/>
  <text x="238" y="122" fill="#9a968e" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Synthesis</text>
  <rect x="328" y="70" width="100" height="36" rx="4" stroke="#a85c3b" stroke-width="1.5" fill="#1a1e2b"/>
  <text x="378" y="92" fill="#9a968e" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Archaeology</text>
  <rect x="468" y="40" width="100" height="36" rx="4" stroke="#5e5a52" stroke-width="1.5" fill="#1a1e2b"/>
  <text x="518" y="62" fill="#9a968e" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Tradition</text>
  <text x="320" y="190" fill="#5e5a52" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Route segments declare an evidence class — not all claims climb the ladder equally.</text>
